
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role & AI Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
    <!-- html2pdf.js for direct high-quality PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                blue: '#A9ECF7',
                yellow: '#FFFAB4',
                green: '#DFFFBE',
                active: '#0095F0',
                accent: '#FF693E',
                cream: '#F9F6EE',
                dark: '#005650',
              }
            },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              serif: ['DM Serif Text', 'serif'],
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #F9F6EE;
            color: black;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, .serif-highlight {
            font-family: 'DM Serif Text', serif;
        }
        
        /* Dashboard Container Styles - Fixed A4 proportions at 96 DPI (794x1123) */
        .dashboard-container {
            background-color: white;
            width: 794px; /* A4 width */
            height: 1123px; /* A4 height */
            margin: 0; /* Changed from auto to 0 to prevent capture skewing */
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden; 
            flex-shrink: 0;
            position: relative;
            box-sizing: border-box;
        }

        @media (max-width: 850px) {
            .dashboard-container {
                width: 100% !important;
                height: auto !important;
                min-height: 100vh;
                border: none;
                box-shadow: none;
                overflow: visible !important;
            }
            .dashboard-content {
                height: auto !important;
                overflow: visible !important;
            }
        }

        /* Utility for centering the container in the web UI without affecting capture */
        .flex-center-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            html, body {
                height: 100%;
                margin: 0 !important;
                padding: 0 !important;
                background-color: white !important;
            }
            .no-print {
                display: none !important;
            }
            #root {
                margin: 0;
                padding: 0;
                height: 100%;
            }
            .dashboard-container {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                padding: 10mm !important;
                box-shadow: none !important;
                border: none !important;
                display: flex !important;
                flex-direction: column !important;
                overflow: hidden !important;
                background-color: white !important;
                position: static !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "react-router-dom": "https://esm.sh/react-router-dom@7.0.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
